name: Security Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # -------------------------
  # 1️⃣ TRIVY
  # -------------------------
  trivy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Export .env.example variables
        run: |
            grep -v '^#' .env.example >> $GITHUB_ENV

      # Cache Trivy DB
      - name: Cache Trivy DB
        uses: actions/cache@v5
        with:
          path: ~/.cache/trivy
          key: trivy-db

      # Scan filesystem
      - name: Scan filesystem
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          scanners: vuln,secret,misconfig
          hide-progress: true


  # =========================
  # 2️⃣ BANDIT (Unsafe code)
  # =========================
  bandit:
    runs-on: ubuntu-latest
    needs: trivy

    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (fail only on HIGH)
        run: |
          bandit -r . -lll -x tests,venv,migrations